<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Book Inventory</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Book Inventory</h1>

    <table>
        <thead>
            <tr>
                <th><span>Title</span></th>
                <th><span>Author</span></th>
                <th><span>Category</span></th>
                <th><span>Status</span></th>
                <th><span>Rate</span></th>
            </tr>
        </thead>

        <tbody>
            <tr class="read">
                <td>Atomic Habits</td>
                <td>James Clear</td>
                <td>Self Help</td>
                <td><span class="status">Read</span></td>
                <td>
                    <span class="rate one">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </td>
            </tr>

            <tr class="to-read">
                <td>The Alchemist</td>
                <td>Paulo Coelho</td>
                <td>Fiction</td>
                <td><span class="status">To Read</span></td>
                <td>
                    <span class="rate two">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </td>
            </tr>

            <tr class="in-progress">
                <td>Clean Code</td>
                <td>Robert C. Martin</td>
                <td>Programming</td>
                <td><span class="status">In Progress</span></td>
                <td>
                    <span class="rate three">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </td>
            </tr>

            <tr class="read">
                <td>Harry Potter</td>
                <td>J. K. Rowling</td>
                <td>Fantasy</td>
                <td><span class="status">Read</span></td>
                <td>
                    <span class="rate one">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
