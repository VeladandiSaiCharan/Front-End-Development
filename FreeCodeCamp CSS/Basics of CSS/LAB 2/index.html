<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <ul class="todo-list">
        <li>
            <input type="checkbox" id="html-css">
            <label for="html-css">Learn HTML and CSS</label>
        <ul class="sub-item">
            <li><a class="sub-item-link" href="https://www.freecodecamp.org/learn" target="_blank">Learn HTML and CSS</a></li>
        </ul>
        </li>

        <li>
            <input type="checkbox" id="js-basics">
            <label for="js-basics">Learn JavaScript Basics</label>
        <ul class="sub-item">
            <li><a class="sub-item-link" href="https://www.freecodecamp.org/learn" target="_blank">Learn JavaScript</a></li>
        </ul>
        </li>

        <li>
            <input type="checkbox" id="dsa-practice">
            <label for="dsa-practice">Practice Data Structures and Algorithms</label>
        <ul class="sub-item">
            <li><a class="sub-item-link" href="https://leetcode.com/problemset/" target="_blank">Practice DSA</a></li>
        </ul>
        </li>
        
        <li>
            <input type="checkbox" id="projects">
            <label for="projects">Work on Personal Projects</label>
        <ul class="sub-item">
            <li><a class="sub-item-link" href="https://github.com/" target="_blank">Work on Personal Projects</a></li>
        </ul>
        </li>

    </ul>
</body>

</html>
